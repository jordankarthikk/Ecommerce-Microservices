spring:
  application:
    name: Product-Service
  boot:
    admin:
      client:
        url: http://localhost:1111
  kafka:
      consumer:
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
               spring.json.trusted.packages: "*"
  datasource:
    url: jdbc:mysql://localhost:3306/ProductService
    username: root
    password: jordan
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 2222
#eureka:
#  client:
#    service-url:
#      defaultZone: http://localhost:8761/eureka/  ** if its not running in the 8761
management:
  endpoints:
    web:
      exposure:
        include: "*"
