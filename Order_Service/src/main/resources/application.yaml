spring:
  application:
    name: order-service
  config:
#    import: optional:configserver:http://localhost:9090
     import: optional:configserver:http://config-server:9090
  kafka:
        bootstrap-servers: kafka:9092
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  boot:
    admin:
      client:
        url: http://admin-server:1111

  datasource:
#    url: jdbc:mysql://localhost:3306/OrderService
    url: jdbc:mysql://mysql:3306/OrderService
    username: root
    password: jordan
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 3333
management:
  endpoints:
    web:
      exposure:
        include: "*"

#msg: "karthikeyan"

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761


